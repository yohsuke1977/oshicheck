<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推し通知 設定</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1 class="logo">推し通知</h1>

    <!-- チャンネル追加 -->
    <section class="card">
      <h2>チャンネルを追加</h2>

      <div class="field">
        <label>プラットフォーム</label>
        <div class="radio-group">
          <label class="radio">
            <input type="radio" name="platform" value="youtube" checked>
            <span>YouTube</span>
          </label>
          <label class="radio">
            <input type="radio" name="platform" value="twitch">
            <span>Twitch</span>
          </label>
          <label class="radio">
            <input type="radio" name="platform" value="twitcasting">
            <span>ツイキャス</span>
          </label>
          <label class="radio">
            <input type="radio" name="platform" value="showroom">
            <span>SHOWROOM</span>
          </label>
        </div>
      </div>

      <div class="field">
        <label id="inputLabel">YouTubeチャンネルURL / @ハンドル</label>
        <input type="text" id="channelInput" placeholder="https://www.youtube.com/@... または UCxxxx">
      </div>

      <button class="btn-primary" id="addBtn">チャンネルを追加</button>
      <div class="add-status" id="addStatus"></div>

      <div class="preview" id="preview" style="display:none">
        <img id="previewThumb" src="" alt="">
        <div>
          <div id="previewName" class="preview-name"></div>
          <div id="previewPlatform" class="preview-platform"></div>
        </div>
        <button class="btn-confirm" id="confirmBtn">登録する</button>
      </div>
    </section>

    <!-- 認証 -->
    <section class="card">
      <div id="authSignedOut">
        <h2>ログイン</h2>
        <p class="hint">ログインするとチャンネルを複数デバイスで同期できます</p>
        <div class="field">
          <label>メールアドレス</label>
          <input type="email" id="authEmail" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="field">
          <label>パスワード（6文字以上）</label>
          <input type="password" id="authPassword" placeholder="password" autocomplete="current-password">
        </div>
        <div class="auth-buttons">
          <button class="btn-primary" id="signInBtn">ログイン</button>
          <button class="btn-secondary" id="signUpBtn">新規登録</button>
        </div>
        <div class="auth-msg" id="authMsg"></div>
      </div>
      <div id="authSignedIn" style="display:none">
        <div class="signed-in-row">
          <div>
            <div class="signed-in-email" id="signedInEmail"></div>
            <div class="signed-in-plan" id="signedInPlan"></div>
          </div>
          <button class="btn-signout" id="signOutBtn">ログアウト</button>
        </div>
      </div>
    </section>

    <!-- フィードバック -->
    <section class="card feedback-card">
      <h2>フィードバック</h2>
      <p class="hint">バグ報告・対応プラットフォームのリクエストはこちらから</p>
      <a class="btn-feedback" href="https://docs.google.com/forms/d/e/1FAIpQLSfW3OG9sLvSZ6lmFk6mypmMoFt_xHQppH0Y3a6nwCg_cPhj5w/viewform" target="_blank" rel="noopener">
        フィードバックを送る
      </a>
    </section>

    <!-- チャンネル一覧 -->
    <section class="card">
      <div class="list-header">
        <h2>登録チャンネル</h2>
        <span class="channel-count" id="channelCount">0 / 5</span>
      </div>
      <div id="channelList">
        <p class="empty">チャンネルが登録されていません</p>
      </div>
      <div class="upgrade-prompt" id="upgradePrompt" style="display:none">
        <div class="upgrade-icon">🔒</div>
        <div>
          <div class="upgrade-title">無料プランは5チャンネルまで</div>
          <div class="upgrade-desc">Pro版にアップグレードすると無制限に追跡できます</div>
        </div>
        <button class="btn-upgrade" id="upgradeBtn">Pro版を見る</button>
      </div>
    </section>
  </div>

  </div>

  <script src="analytics.js"></script>
  <script src="firebase.js"></script>
  <script src="options.js"></script>
</body>
</html>
